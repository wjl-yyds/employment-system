<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>省级统计</title>
  <style>
    body{font-family:"Microsoft YaHei",sans-serif;background:#f6f9fc;margin:0;}
    .wrap{max-width:980px;margin:30px auto;background:#fff;border:1px solid #dbe8f5;border-radius:8px;padding:20px;}
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 16px;}
    .card{background:#eef5fc;border:1px solid #d2e3f4;border-radius:8px;padding:12px;}
    table{width:100%;border-collapse:collapse;} th,td{border:1px solid #d9e6f2;padding:8px;} th{background:#eef4fb;}
    button{height:36px;border:0;border-radius:6px;background:#1f6fb2;color:#fff;cursor:pointer;margin-right:8px;padding:0 12px;}
    .msg{margin-top:10px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>省级汇总统计与导出</h1>
    <button onclick="logout()">退出登录</button>
  </div>
  <p>当前用户：<span id="who"></span></p>
  <div>
    <button onclick="loadStats()">刷新统计</button>
    <button onclick="exportExcel()">导出Excel</button>
  </div>

  <div class="cards">
    <div class="card">全省就业总数：<b id="empTotal">0</b></div>
    <div class="card">全省失业总数：<b id="unempTotal">0</b></div>
  </div>

  <table>
    <thead><tr><th>市州代码</th><th>就业总数</th><th>失业总数</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div id="msg" class="msg"></div>
</div>

<script>
function uid(){ return localStorage.getItem('userId'); }
function role(){ return localStorage.getItem('roleCode'); }
function setMsg(t){ document.getElementById('msg').textContent=t; }
function logout(){ localStorage.clear(); location.href='/login.html'; }

(function init(){
  if(!uid()){ location.href='/login.html'; return; }
  if(role() !== 'PROVINCE' && role() !== 'ADMIN'){ location.href='/login.html'; return; }
  document.getElementById('who').textContent = `${localStorage.getItem('realName') || ''}（ID: ${uid()}）`;
  loadStats();
})();

async function loadStats(){
  const res = await fetch('/api/stats/province-summary',{ headers:{'X-User-Id':uid()} });
  const data = await res.json();
  if(!res.ok || data.code!==0){ setMsg('查询失败：'+(data.message||'')); return; }

  const total = data.data.total || {};
  document.getElementById('empTotal').textContent = total.employmentTotal || 0;
  document.getElementById('unempTotal').textContent = total.unemploymentTotal || 0;

  const tb = document.getElementById('tb'); tb.innerHTML='';
  (data.data.cityStats || []).forEach(it=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${it.cityCode}</td><td>${it.employmentTotal}</td><td>${it.unemploymentTotal}</td>`;
    tb.appendChild(tr);
  });
  setMsg('统计加载完成');
}

function exportExcel(){
  fetch('/api/export/reports', { headers:{'X-User-Id':uid()} })
    .then(res => {
      if(!res.ok){ throw new Error('导出失败'); }
      return res.blob();
    })
    .then(blob => {
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '就业失业数据.xlsx';
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);
      setMsg('导出完成');
    })
    .catch(err => setMsg(err.message));
}
</script>
</body>
</html>
