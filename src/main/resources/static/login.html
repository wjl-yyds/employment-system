<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系统登录</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background:#f3f6fb; margin:0; }
    .card { max-width:460px; margin:60px auto; background:#fff; border:1px solid #d9e2ef; border-radius:10px; padding:24px; }
    h1 { margin:0 0 16px; color:#174a7a; font-size:22px; }
    .row { margin-bottom:10px; }
    input, button { width:100%; height:40px; box-sizing:border-box; }
    input { border:1px solid #c7d4e5; border-radius:6px; padding:0 10px; }
    button { border:0; border-radius:6px; background:#1565a7; color:#fff; cursor:pointer; }
    .msg { margin-top:10px; font-size:14px; }
    .ok { color:#136f3a; }
    .err { color:#b71c1c; }
    .tips { margin-top:12px; color:#51657a; font-size:13px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>云南省就业失业数据系统登录</h1>
    <div class="row"><input id="username" placeholder="用户名，如 enterprise1 / city1 / province1 / admin1" /></div>
    <div class="row"><input id="password" type="password" placeholder="密码，默认 123456" /></div>
    <button onclick="login()">登录</button>
    <div id="msg" class="msg"></div>
    <div class="tips">
      角色跳转规则：企业 -> 企业填报页；市级 -> 市级审核页；省级/管理员 -> 省级统计页。
    </div>
  </div>

<script>
function showMsg(text, ok){
  const msg = document.getElementById('msg');
  msg.className = 'msg ' + (ok ? 'ok' : 'err');
  msg.textContent = text;
}

function goByRole(role){
  if(role === 'ENTERPRISE') location.href = '/enterprise-report.html';
  else if(role === 'CITY') location.href = '/city-audit.html';
  else location.href = '/province-stats.html';
}

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) {
    showMsg('请输入用户名和密码', false);
    return;
  }

  const body = new URLSearchParams({ username, password });
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  });
  const data = await res.json();
  if (!res.ok || data.code !== 0) {
    showMsg(data.message || '登录失败', false);
    return;
  }

  localStorage.setItem('userId', data.data.userId);
  localStorage.setItem('roleCode', data.data.roleCode);
  localStorage.setItem('realName', data.data.realName || '');
  showMsg(`登录成功：${data.data.realName}（${data.data.roleCode}）`, true);
  setTimeout(() => goByRole(data.data.roleCode), 500);
}
</script>
</body>
</html>
