<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云南省企业就业失业数据填报</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            width: 92%;
            max-width: 680px;
            margin: 40px auto;
            background: #fff;
            border: 1px solid #dfe6ee;
            border-radius: 8px;
            padding: 24px;
            box-sizing: border-box;
        }
        h1 {
            margin: 0 0 20px;
            font-size: 22px;
            color: #1f4e79;
        }
        .form-item {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            height: 38px;
            padding: 0 10px;
            border: 1px solid #c9d3df;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            background: #1f6fb2;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover {
            background: #185b92;
        }
        .result {
            margin-top: 14px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background: #eaf7ea;
            color: #1d6b1d;
            border: 1px solid #bfe6bf;
        }
        .error {
            background: #fff1f1;
            color: #b3261e;
            border: 1px solid #f1c1bf;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>企业就业失业数据填报</h1>
    <form id="dataForm">
        <div class="form-item">
            <label for="enterpriseName">企业名称</label>
            <input type="text" id="enterpriseName" required maxlength="200">
        </div>
        <div class="form-item">
            <label for="employmentCount">就业人数</label>
            <input type="number" id="employmentCount" required min="0">
        </div>
        <div class="form-item">
            <label for="unemploymentCount">失业人数</label>
            <input type="number" id="unemploymentCount" required min="0">
        </div>
        <div class="form-item">
            <label for="reportDate">填报日期</label>
            <input type="date" id="reportDate" required>
        </div>
        <button type="submit">提交数据</button>
    </form>
    <div id="result" class="result"></div>
</div>

<script>
    const form = document.getElementById('dataForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async function (event) {
        event.preventDefault();

        const payload = {
            enterpriseName: document.getElementById('enterpriseName').value.trim(),
            employmentCount: Number(document.getElementById('employmentCount').value),
            unemploymentCount: Number(document.getElementById('unemploymentCount').value),
            reportDate: document.getElementById('reportDate').value
        };

        try {
            const response = await fetch('/api/enterprise-data/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok || data.code !== 0) {
                throw new Error(data.message || '提交失败');
            }

            result.style.display = 'block';
            result.className = 'result success';
            result.textContent = data.message + '，数据ID：' + data.data.dataId;
            form.reset();
        } catch (error) {
            result.style.display = 'block';
            result.className = 'result error';
            result.textContent = '提交失败：' + error.message;
        }
    });
</script>
</body>
</html>
