<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市级审核</title>
  <style>
    body{font-family:"Microsoft YaHei",sans-serif;background:#f4f8fb;margin:0;}
    .wrap{max-width:980px;margin:30px auto;background:#fff;border:1px solid #d9e6f2;border-radius:8px;padding:20px;}
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    table{width:100%;border-collapse:collapse;font-size:14px;}
    th,td{border:1px solid #d9e6f2;padding:8px;text-align:left;}
    th{background:#eef4fb;}
    button{border:0;border-radius:4px;padding:6px 10px;cursor:pointer;}
    .ok{background:#1f7a38;color:#fff;} .rej{background:#b3261e;color:#fff;}
    .msg{margin-top:10px;}
    .small-btn { background:#1a6aa8; color:#fff; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>市级审核页面</h1>
    <button class="small-btn" onclick="logout()">退出登录</button>
  </div>
  <p>当前用户：<span id="who"></span></p>
  <button class="small-btn" onclick="loadPending()">刷新待审核列表</button>
  <table>
    <thead><tr><th>报表ID</th><th>企业ID</th><th>就业人数</th><th>失业人数</th><th>减少原因</th><th>操作</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div id="msg" class="msg"></div>
</div>

<script>
function uid(){ return localStorage.getItem('userId'); }
function role(){ return localStorage.getItem('roleCode'); }
function msg(t){ document.getElementById('msg').textContent=t; }
function logout(){ localStorage.clear(); location.href='/login.html'; }

(function init(){
  if(!uid() || role() !== 'CITY'){ location.href='/login.html'; return; }
  document.getElementById('who').textContent = `${localStorage.getItem('realName') || ''}（ID: ${uid()}）`;
  loadPending();
})();

async function loadPending(){
  const res = await fetch('/api/audit/city/pending-reports', { headers:{'X-User-Id':uid()} });
  const data = await res.json();
  if(!res.ok || data.code!==0){ msg('加载失败：'+(data.message||'')); return; }
  const tb = document.getElementById('tb'); tb.innerHTML='';
  data.data.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.id}</td><td>${r.enterpriseId}</td><td>${r.employmentCount}</td><td>${r.unemploymentCount}</td><td>${r.decreaseReason||''}</td>
      <td>
      <button class="ok" onclick="audit(${r.id},'APPROVED')">通过</button>
      <button class="rej" onclick="audit(${r.id},'REJECTED')">驳回</button>
      </td>`;
    tb.appendChild(tr);
  });
  msg('待审核：'+data.data.length+' 条');
}

async function audit(id,status){
  const comment = prompt('审核意见（可选）','');
  const url = `/api/audit/city/report/${id}?status=${encodeURIComponent(status)}&comment=${encodeURIComponent(comment||'')}`;
  const res = await fetch(url, { method:'POST', headers:{'X-User-Id':uid()} });
  const data = await res.json();
  if(!res.ok || data.code!==0){ msg('审核失败：'+(data.message||'')); return; }
  msg('审核完成：'+id+' -> '+status);
  loadPending();
}
</script>
</body>
</html>
