<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业就业失业数据填报</title>
</head>
<body>
    <h1>企业就业失业数据填报</h1>
    <form id="dataForm">
        <label for="enterpriseName">企业名称:</label>
        <input type="text" id="enterpriseName" name="enterpriseName" required><br><br>

        <label for="employmentCount">就业人数:</label>
        <input type="number" id="employmentCount" name="employmentCount" required><br><br>

        <label for="unemploymentCount">失业人数:</label>
        <input type="number" id="unemploymentCount" name="unemploymentCount" required><br><br>

        <label for="reportDate">填报日期:</label>
        <input type="date" id="reportDate" name="reportDate" required><br><br>

        <button type="button" onclick="submitData()">提交</button>
    </form>

    <script>
        function submitData() {
            const formData = {
                enterpriseName: document.getElementById('enterpriseName').value,
                employmentCount: document.getElementById('employmentCount').value,
                unemploymentCount: document.getElementById('unemploymentCount').value,
                reportDate: document.getElementById('reportDate').value
            };

            fetch('/api/enterprise-data/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.text())
            .then(data => alert(data))
            .catch(error => alert('提交失败: ' + error));
        }
    </script>
</body>
</html>
